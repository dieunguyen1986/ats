# =============================================================================
# ATS Backend — Docker Compose
# =============================================================================
# Project     : Applicant Tracking System (ATS)
# Architecture: Modular Monolith (ADR-001)
# Scope       : Local development + Single-VPS production deployment
#
# Usage:
#   Development : docker compose up -d
#   Production  : docker compose -f docker-compose.yml up -d
#   Logs        : docker compose logs -f ats-backend
#   Stop        : docker compose down
#   Full reset  : docker compose down -v   (WARNING: deletes DB data)
#
# Prerequisites:
#   - Copy .env.example to .env and fill in real values
#   - Docker Engine 24+ and Docker Compose v2+
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 17 — Primary Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17-alpine
    container_name: ats-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${DB_NAME:-ats_db}
      POSTGRES_USER: ${DB_USERNAME:-ats_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      # Performance tuning for small VPS (1-2GB RAM)
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"

    volumes:
      # Named volume — persists DB data across container restarts
      - postgres_data:/var/lib/postgresql/data

    ports:
      # Expose to localhost only — NOT to public internet
      # Remove this in production if no direct DB access needed
      - "127.0.0.1:${DB_PORT:-5432}:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ats_user} -d ${DB_NAME:-ats_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - ats-network

    # Resource limits for small VPS (DigitalOcean $12/mo: 1GB RAM)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # ATS Backend — Spring Boot Application
  # ---------------------------------------------------------------------------
  ats-backend:
    build:
      context: .
      dockerfile: Dockerfile
      # Use 'image' instead of 'build' in production (pull pre-built image):
      # image: ghcr.io/your-org/ats-be:latest
    container_name: ats-backend
    restart: unless-stopped

    environment:
      # --- Database (override application.yml defaults) ---
      DB_HOST: postgres          # Service name = internal DNS in Docker network
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ats_db}
      DB_USERNAME: ${DB_USERNAME:-ats_user}
      DB_PASSWORD: ${DB_PASSWORD}

      # --- JWT Security ---
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}

      # --- Application ---
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # --- JVM Tuning (override Dockerfile ENV if needed) ---
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -Djava.security.egd=file:/dev/./urandom

    ports:
      # In production behind Nginx: bind to 127.0.0.1 only
      # In local dev: bind to 0.0.0.0 for direct access
      - "${SERVER_PORT:-8080}:8080"

    depends_on:
      postgres:
        condition: service_healthy  # Wait for DB to be ready BEFORE starting app
                                    # Prevents Flyway migration failures on cold start

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s   # Allow extra time: JVM startup + Flyway migrations

    networks:
      - ats-network

    deploy:
      resources:
        limits:
          memory: 768M      # 75% of 1GB VPS RAM for JVM heap
        reservations:
          memory: 512M

    # Log rotation — prevents disk fill on long-running containers
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

# =============================================================================
# Volumes — Named volumes are managed by Docker, survive container removal
# =============================================================================
volumes:
  postgres_data:
    driver: local
    # In production on a VPS, this maps to /var/lib/docker/volumes/
    # For backup: docker run --rm -v ats-be_postgres_data:/data -v $(pwd):/backup \
    #             alpine tar czf /backup/postgres_backup_$(date +%Y%m%d).tar.gz /data

# =============================================================================
# Networks — Isolated bridge network for service-to-service communication
# =============================================================================
networks:
  ats-network:
    driver: bridge
    # Services on this network can reach each other by container name (DNS)
    # ats-backend → postgres:5432 (internal, NOT exposed to host)
