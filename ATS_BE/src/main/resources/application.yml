server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: ATS_BE
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # --- Database Connection ---
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/ats_db
    username: ${DB_USERNAME:dieunt}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: none     # Schema quản lý hoàn toàn qua Flyway
    open-in-view: false       # Tắt OSIV — bắt buộc theo coding conventions L3

  # --- Flyway Migrations ---
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 3          # DB schema (V1-V3) already exists — skip DDL migrations
    repair-on-migrate: true      # Auto-repair checksum mismatches from manually-inserted baseline records
    validate-on-migrate: false   # Dev mode: skip strict validation to allow manual baseline setup
    locations: classpath:db/migration

# --- JWT Configuration ---
app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
