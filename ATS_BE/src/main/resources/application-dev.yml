spring:
  # --- Dev-only JPA/SQL logging ---
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

  # --- Dev: Cho phép flyway:clean (reset DB dễ dàng) ---
  flyway:
    clean-disabled: false

# --- Dev: Swagger UI bật đầy đủ ---
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true

# --- Logging level chi tiết hơn cho dev ---
logging:
  level:
    com.ats: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
